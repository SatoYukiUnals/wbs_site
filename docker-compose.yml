# =====================================================================
# 開発用 Docker Compose
#
# 起動：  docker compose up
# 停止：  docker compose down
# 再ビルド：docker compose up --build
#
# アクセス：http://localhost:5173/
# =====================================================================

services:
  # ------------------------------------------------------------------
  # フロントエンド（Vite dev server + HMR）
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: wbs_frontend_dev
    ports:
      - "5173:5173"
    volumes:
      # ソースコードをマウントして HMR を有効化
      - ./frontend:/app
      # node_modules はコンテナ内のものを使用（ホストのもので上書きしない）
      - frontend_node_modules:/app/node_modules
    networks:
      - app_net
    depends_on:
      db:
        condition: service_healthy

  # ------------------------------------------------------------------
  # データベース（PostgreSQL 16）
  # ------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: wbs_db_dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wbs_db}
      POSTGRES_USER: ${POSTGRES_USER:-wbs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wbs_password}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wbs_user} -d ${POSTGRES_DB:-wbs_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # バックエンド（Django + runserver）
  # ------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: wbs_backend_dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wbs_user}:${POSTGRES_PASSWORD:-wbs_password}@db:5432/${POSTGRES_DB:-wbs_db}
      SECRET_KEY: ${DJANGO_SECRET_KEY:-dev_secret_key}
      DEBUG: "True"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
    networks:
      - app_net
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py runserver 0.0.0.0:8000"

networks:
  app_net:
    driver: bridge

volumes:
  postgres_dev_data:
  frontend_node_modules:
