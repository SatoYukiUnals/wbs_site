version: '3.9'

services:
  db:
    image: postgres:15.5-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: wbs_db
      POSTGRES_USER: wbs_user
      POSTGRES_PASSWORD: wbs_password
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://wbs_user:wbs_password@db:5432/wbs_db
      - DB_HOST=db
      - DB_NAME=wbs_db
      - DB_USER=wbs_user
      - DB_PASSWORD=wbs_password
    depends_on:
      - db

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
